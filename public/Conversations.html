<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gespräche – Future Media</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--surface:#0e0e1e;--border:rgba(255,255,255,.08);
  --text:#e8eaf2;--muted:#7a7f9a;--green:#5dcaa5;--blue:#7aa3f5;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
body.fa{font-family:'Vazirmatn',sans-serif;direction:rtl}

.header{
  background:linear-gradient(135deg,#0a0a1a,#0e1a2e);
  border-bottom:1px solid var(--border);padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;gap:12px;flex-wrap:wrap;
}
.header-left{display:flex;align-items:center;gap:12px}
.logo{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#1a7f5a,#5dcaa5);
  display:flex;align-items:center;justify-content:center;font-size:17px;
}
.header-title{font-size:15px;font-weight:600}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px}
.header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}

.stats-row{display:flex;gap:18px}
.stat{text-align:center}
.stat-val{font-size:18px;font-weight:700;color:var(--green);line-height:1}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:3px}

.lang-switch{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:30px;padding:3px;gap:2px}
.lang-btn{
  background:none;border:none;color:var(--muted);font-size:11px;
  letter-spacing:.05em;font-family:inherit;padding:4px 9px;border-radius:30px;cursor:pointer;transition:all .2s;
}
.lang-btn.active{background:rgba(93,202,165,.14);color:var(--green);border:1px solid rgba(93,202,165,.28)}

.main{display:flex;height:calc(100vh - 69px)}

.list-panel{
  width:355px;min-width:270px;border-right:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;
}
body.fa .list-panel{border-right:none;border-left:1px solid var(--border)}

.list-toolbar{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;gap:7px;align-items:center;
  position:sticky;top:0;background:var(--bg);z-index:5;
}
.search-input{
  flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;
  font-family:inherit;outline:none;min-width:0;
}
.search-input:focus{border-color:rgba(93,202,165,.4)}
.sort-select{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:8px;padding:7px 8px;color:var(--muted);font-size:11px;
  font-family:inherit;outline:none;cursor:pointer;flex-shrink:0;
}

.conv-item{
  padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .15s;border-left:3px solid transparent;
  position:relative;
}
body.fa .conv-item{border-left:none;border-right:3px solid transparent}
.conv-item:hover{background:rgba(255,255,255,.025)}
.conv-item.active{background:rgba(93,202,165,.05);border-left-color:var(--green)}
body.fa .conv-item.active{border-left-color:transparent;border-right-color:var(--green)}
.del-btn{
  position:absolute;top:10px;right:10px;
  background:none;border:none;color:rgba(248,113,113,.35);
  cursor:pointer;padding:4px 5px;border-radius:6px;font-size:13px;
  line-height:1;transition:all .2s;opacity:0;
}
body.fa .del-btn{right:auto;left:10px}
.conv-item:hover .del-btn{opacity:1}
.del-btn:hover{background:rgba(248,113,113,.12);color:#f87171}
.conv-date{font-size:11px;color:var(--green);font-weight:500;margin-bottom:5px}
.conv-summary{
  font-size:12px;color:var(--muted);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.conv-meta{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.badge-green{background:rgba(93,202,165,.1);color:var(--green);border:1px solid rgba(93,202,165,.18)}
.badge-blue{background:rgba(122,163,245,.08);color:var(--blue);border:1px solid rgba(122,163,245,.14)}
.badge-gray{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)}
.empty-list{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}

.detail-panel{flex:1;overflow-y:auto;padding:22px}
.detail-empty{
  height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--muted);gap:12px;opacity:.35;
}
.detail-empty svg{width:52px;height:52px}
.detail-empty p{font-size:14px}

.detail-header{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:17px 19px;margin-bottom:16px;
}
.detail-title{font-size:14px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:9px}
.detail-stat{background:rgba(255,255,255,.03);border-radius:10px;padding:10px 12px}
.detail-stat-val{font-size:17px;font-weight:700;color:var(--green);margin-bottom:2px}
.detail-stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}

.summary-box{
  background:rgba(93,202,165,.05);border:1px solid rgba(93,202,165,.16);
  border-radius:12px;padding:14px 16px;margin-bottom:16px;
}
.section-label{font-size:9px;color:var(--green);text-transform:uppercase;letter-spacing:.15em;margin-bottom:8px;font-weight:600}
.summary-text{font-size:13px;line-height:1.75;color:var(--text)}
.no-summary{font-size:12px;color:var(--muted);font-style:italic}

.transcript-wrap{margin-top:2px}
.msg{display:flex;gap:9px;margin-bottom:10px;align-items:flex-start}
body.fa .msg{flex-direction:row-reverse}
.msg-avatar{
  width:26px;height:26px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px;
}
.msg-avatar.ai{background:rgba(93,202,165,.13)}
.msg-avatar.user{background:rgba(122,163,245,.1)}
.msg-bubble{flex:1;padding:9px 13px;border-radius:11px;font-size:13px;line-height:1.65}
.msg-bubble.ai{background:rgba(93,202,165,.06);border:1px solid rgba(93,202,165,.12)}
.msg-bubble.user{background:rgba(122,163,245,.06);border:1px solid rgba(122,163,245,.12)}
.msg-role{font-size:9px;font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.07em}
.msg-role.ai{color:var(--green)}
.msg-role.user{color:var(--blue)}

.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

@media(max-width:680px){
  .main{flex-direction:column;height:auto}
  .list-panel{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:42vh}
  body.fa .list-panel{border-left:none}
  .detail-panel{padding:14px}
  .stats-row{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🎙️</div>
    <div>
      <div class="header-title" id="hTitle">Gespräche</div>
      <div class="header-sub">Future Media · Voice AI</div>
    </div>
  </div>
  <div class="header-right">
    <div class="stats-row">
      <div class="stat">
        <div class="stat-val" id="totalConvs">—</div>
        <div class="stat-label" id="lStatConvs">Gespräche</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="totalMsgs">—</div>
        <div class="stat-label" id="lStatMsgs">Nachrichten</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="avgDur">—</div>
        <div class="stat-label" id="lStatAvg">Ø Dauer</div>
      </div>
    </div>
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('de')">DE</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('fa')">FA</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="list-panel">
    <div class="list-toolbar">
      <input class="search-input" id="searchInput" oninput="filterList()">
      <select class="sort-select" id="sortSelect" onchange="renderList()"></select>
    </div>
    <div id="convList"><div class="loading" id="lLoading">Lade…</div></div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <p id="lSelectHint">Gespräch auswählen</p>
    </div>
  </div>
</div>

<script>
// ── Translations ──────────────────────────────────────────────────────────────
const T = {
  de:{
    title:'Gespräche', statConvs:'Gespräche', statMsgs:'Nachrichten', statAvg:'Ø Dauer',
    search:'🔍  Suchen…',
    s_newest:'Neueste', s_oldest:'Älteste', s_longest:'Längste', s_mostmsgs:'Meist Msgs',
    loading:'Lade…', selectHint:'Gespräch auswählen', noResults:'Keine Gespräche gefunden',
    errLoad:'Fehler beim Laden',
    dur:'Dauer', msgs:'Nachrichten', visitor:'Besucher', ai:'AI',
    summaryLabel:'✦ Zusammenfassung (GPT-4o-mini)', noSummary:'Keine Zusammenfassung verfügbar',
    transcriptLabel:'📝 Vollständiges Gespräch', noTranscript:'Kein Transkript',
    roleAI:'Asad (AI)', roleUser:'Besucher', convWord:'Gespräch',
  },
  en:{
    title:'Conversations', statConvs:'Conversations', statMsgs:'Messages', statAvg:'Avg Duration',
    search:'🔍  Search…',
    s_newest:'Newest', s_oldest:'Oldest', s_longest:'Longest', s_mostmsgs:'Most Msgs',
    loading:'Loading…', selectHint:'Select a conversation', noResults:'No conversations found',
    errLoad:'Failed to load',
    dur:'Duration', msgs:'Messages', visitor:'Visitor', ai:'AI',
    summaryLabel:'✦ Summary (GPT-4o-mini)', noSummary:'No summary available',
    transcriptLabel:'📝 Full Conversation', noTranscript:'No transcript available',
    roleAI:'Asad (AI)', roleUser:'Visitor', convWord:'Conversation',
  },
  fa:{
    title:'مکالمات', statConvs:'مکالمات', statMsgs:'پیام‌ها', statAvg:'میانگین مدت',
    search:'🔍  جستجو…',
    s_newest:'جدیدترین', s_oldest:'قدیمی‌ترین', s_longest:'طولانی‌ترین', s_mostmsgs:'بیشترین پیام',
    loading:'در حال بارگذاری…', selectHint:'یک مکالمه انتخاب کنید', noResults:'مکالمه‌ای یافت نشد',
    errLoad:'خطا در بارگذاری',
    dur:'مدت', msgs:'پیام‌ها', visitor:'بازدیدکننده', ai:'هوش مصنوعی',
    summaryLabel:'✦ خلاصه (GPT-4o-mini)', noSummary:'خلاصه‌ای موجود نیست',
    transcriptLabel:'📝 متن کامل مکالمه', noTranscript:'متنی موجود نیست',
    roleAI:'اسد (AI)', roleUser:'بازدیدکننده', convWord:'مکالمه',
  },
};

let lang = 'de';
function t(k){ return T[lang][k] || T.de[k] || k; }

function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.body.classList.toggle('fa', l === 'fa');
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.toLowerCase() === l));

  // Static labels
  document.getElementById('hTitle').textContent      = t('title');
  document.getElementById('lStatConvs').textContent  = t('statConvs');
  document.getElementById('lStatMsgs').textContent   = t('statMsgs');
  document.getElementById('lStatAvg').textContent    = t('statAvg');
  document.getElementById('lSelectHint').textContent = t('selectHint');
  document.getElementById('searchInput').placeholder = t('search');

  // Sort dropdown
  const sel = document.getElementById('sortSelect');
  const cur = sel.value;
  sel.innerHTML = [
    ['newest', t('s_newest')],
    ['oldest', t('s_oldest')],
    ['longest', t('s_longest')],
    ['most_msgs', t('s_mostmsgs')],
  ].map(([v,lbl]) => `<option value="${v}">${lbl}</option>`).join('');
  sel.value = cur || 'newest';

  updateStats();
  renderList();
  if(activeId) openDetail(activeId);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtDate(iso){
  const d = new Date(iso);
  const loc = {de:'de-CH', en:'en-GB', fa:'fa-IR'}[lang] || 'de-CH';
  return d.toLocaleString(loc, {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtDur(s){
  if(!s) return '—';
  const m = Math.floor(s/60), sec = s%60;
  if(lang==='fa') return m>0 ? `${m}د ${sec}ث` : `${sec}ث`;
  return m>0 ? `${m}m ${sec}s` : `${sec}s`;
}
function flag(l){ return {de:'🇨🇭',en:'🇬🇧',fa:'🇮🇷'}[l]||'🌐'; }
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyText(e, text) {
  e.stopPropagation();
  navigator.clipboard.writeText(text).then(() => {
    const el = e.currentTarget;
    const orig = el.innerHTML;
    el.innerHTML = el.innerHTML.replace(/✉|📞/, '✓');
    el.style.opacity = '.6';
    setTimeout(() => { el.innerHTML = orig; el.style.opacity = '1'; }, 1200);
  });
}

// ── Data ──────────────────────────────────────────────────────────────────────
let all = [];
let activeId = null;

async function load(){
  try{
    all = await fetch('/admin/conversations').then(r=>r.json());
    updateStats();
    renderList();
  } catch {
    document.getElementById('convList').innerHTML =
      `<div class="empty-list">${t('errLoad')}</div>`;
  }
}

function updateStats(){
  document.getElementById('totalConvs').textContent = all.length;
  document.getElementById('totalMsgs').textContent  = all.reduce((a,c)=>a+(c.msg_count||0),0);
  const avg = all.length ? Math.round(all.reduce((a,c)=>a+(c.duration_s||0),0)/all.length) : 0;
  document.getElementById('avgDur').textContent = fmtDur(avg);
}

function filterList(){ renderList(); }

function renderList(){
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let list   = all.filter(c => !q || (c.summary||'').toLowerCase().includes(q) || fmtDate(c.started_at).includes(q));
  list = [...list].sort((a,b)=>{
    if(sort==='oldest')    return new Date(a.started_at)-new Date(b.started_at);
    if(sort==='longest')   return (b.duration_s||0)-(a.duration_s||0);
    if(sort==='most_msgs') return (b.msg_count||0)-(a.msg_count||0);
    return new Date(b.started_at)-new Date(a.started_at);
  });

  const el = document.getElementById('convList');
  if(!list.length){ el.innerHTML=`<div class="empty-list">${t('noResults')}</div>`; return; }

  el.innerHTML = list.map(c=>`
    <div class="conv-item ${c.id===activeId?'active':''}" onclick="openDetail(${c.id})">
      <button class="del-btn" onclick="deleteConv(event,${c.id})" title="Löschen">🗑</button>
      <div class="conv-date">${flag(c.lang)} ${fmtDate(c.started_at)}</div>
      ${(c.contact_email||c.contact_phone) ? `
      <div style="display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap">
        ${c.contact_email ? `<span onclick="copyText(event,'${esc(c.contact_email)}')" style="font-size:11px;color:#5dcaa5;cursor:pointer;text-decoration:none;">✉ ${esc(c.contact_email)}</span>` : ''}
        ${c.contact_phone ? `<span style="font-size:11px;color:#7aa3f5;">📞 ${esc(c.contact_phone)}</span>` : ''}
      </div>` : ''}
      <div class="conv-summary">${c.summary
        ? esc(c.summary)
        : `<em style="opacity:.4">${t('noSummary')}</em>`}</div>
      <div class="conv-meta">
        <span class="badge badge-green">⏱ ${fmtDur(c.duration_s)}</span>
        <span class="badge badge-blue">💬 ${c.msg_count||0}</span>
        <span class="badge badge-gray">🎤${c.user_count||0} 🤖${c.ai_count||0}</span>
      </div>
    </div>`).join('');
}

async function deleteConv(e, id) {
  e.stopPropagation(); // prevent opening detail
  if (!confirm('Gespräch #' + id + ' wirklich löschen?')) return;
  try {
    await fetch(`/admin/conversations/${id}`, { method: 'DELETE' });
    all = all.filter(c => c.id !== id);
    if (activeId === id) {
      activeId = null;
      document.getElementById('detailPanel').innerHTML = `
        <div class="detail-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
          <p>${t('selectHint')}</p>
        </div>`;
    }
    updateStats();
    renderList();
  } catch { alert('Fehler beim Löschen'); }
}

// ── Detail ────────────────────────────────────────────────────────────────────
async function openDetail(id){
  activeId = id;
  renderList();
  document.getElementById('detailPanel').innerHTML = `<div class="loading">${t('loading')}</div>`;
  try{
    const c = await fetch(`/admin/conversations/${id}`).then(r=>r.json());
    const msgs = (c.transcript||[]).map(m=>`
      <div class="msg">
        <div class="msg-avatar ${m.role==='ai'?'ai':'user'}">${m.role==='ai'?'🤖':'🎤'}</div>
        <div class="msg-bubble ${m.role==='ai'?'ai':'user'}">
          <div class="msg-role ${m.role==='ai'?'ai':'user'}">${m.role==='ai'?t('roleAI'):t('roleUser')}</div>
          ${esc(m.text)}
        </div>
      </div>`).join('');

    document.getElementById('detailPanel').innerHTML = `
      <div class="detail-header">
        <div class="detail-title">
          ${flag(c.lang)} ${t('convWord')} #${c.id}
          <span class="badge badge-gray">${fmtDate(c.started_at)}</span>
        </div>
        <div class="detail-grid">
          <div class="detail-stat">
            <div class="detail-stat-val">${fmtDur(c.duration_s)}</div>
            <div class="detail-stat-label">${t('dur')}</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val">${c.msg_count||0}</div>
            <div class="detail-stat-label">${t('msgs')}</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val">${c.user_count||0}</div>
            <div class="detail-stat-label">${t('visitor')}</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val">${c.ai_count||0}</div>
            <div class="detail-stat-label">${t('ai')}</div>
          </div>
        </div>
        ${(c.contact_email||c.contact_phone) ? `
        <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
          ${c.contact_email ? `
          <div onclick="copyText(event,'${esc(c.contact_email)}')" style="background:rgba(93,202,165,.08);border:1px solid rgba(93,202,165,.2);
            border-radius:8px;padding:8px 12px;font-size:12px;color:#5dcaa5;cursor:pointer;" title="Kopieren">
            ✉ ${esc(c.contact_email)}
          </div>` : ''}
          ${c.contact_phone ? `
          <div style="background:rgba(122,163,245,.08);border:1px solid rgba(122,163,245,.2);
            border-radius:8px;padding:8px 12px;font-size:12px;color:#7aa3f5;">
            📞 ${esc(c.contact_phone)}
          </div>` : ''}
        </div>` : ''}
      </div>

      <div class="summary-box">
        <div class="section-label">${t('summaryLabel')}</div>
        ${c.summary
          ? `<div class="summary-text">${esc(c.summary)}</div>`
          : `<div class="no-summary">${t('noSummary')}</div>`}
      </div>

      <div class="transcript-wrap">
        <div class="section-label" style="margin-bottom:12px">${t('transcriptLabel')}</div>
        ${msgs || `<div class="no-summary">${t('noTranscript')}</div>`}
      </div>`;
  } catch {
    document.getElementById('detailPanel').innerHTML =
      `<div class="detail-empty"><p>${t('errLoad')}</p></div>`;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
setLang('de');
load();
setInterval(load, 30000);
</script>
</body>
</html>
